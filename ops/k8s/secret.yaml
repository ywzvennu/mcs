# Secret — contains credentials that must NOT be committed to source control.
#
# Before applying, replace every CHANGE_ME placeholder with a real value:
#
#   MCS_SESSION__SECRET   — generate with: openssl rand -hex 32
#   POSTGRES_PASSWORD     — a strong random password for the mcs database user
#
# Recommended: manage this Secret with a secrets manager (External Secrets
# Operator, Sealed Secrets, Vault Agent, AWS Secrets Manager CSI driver, etc.)
# rather than storing base64-encoded literals in version control.
#
# The values below are base64-encoded placeholders.  To encode a real value:
#   echo -n "your-real-secret" | base64
#
# kubectl apply -f secret.yaml   (only after substituting real values)
apiVersion: v1
kind: Secret
metadata:
  name: mcs-secret
  namespace: mcs
  labels:
    app.kubernetes.io/name: mcs
    app.kubernetes.io/component: server
type: Opaque
# stringData lets you supply raw (un-encoded) values.  Remove the `data:` block
# below and use `stringData:` instead if you prefer to avoid manual base64.
data:
  # MCS session signing secret — MUST be set to a high-entropy random value.
  # Replace CHANGE_ME with: $(openssl rand -hex 32 | base64 | tr -d '\n')
  MCS_SESSION__SECRET: "Q0hBTkdFX01F"

  # Postgres DSN for the mcs database user.
  # Replace CHANGE_ME with: $(echo -n "postgres://mcs:PASSWORD@postgres:5432/mcs" | base64 | tr -d '\n')
  MCS_DATABASE_URL: "cG9zdGdyZXM6Ly9tY3M6Q0hBTkdFX01FQHBvc3RncmVzOjU0MzIvbWNz"

  # x402 payments facilitator API key (only required when payments are enabled).
  # Remove or leave empty if payments.enabled = false.
  MCS_PAYMENTS__FACILITATOR_API_KEY: ""
