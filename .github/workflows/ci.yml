name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # sqlx macros use cached query metadata (.sqlx/) instead of a live DB.
  SQLX_OFFLINE: "true"

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all --all-features

      - name: Build
        run: cargo build --all --all-features

  # ---------------------------------------------------------------------------
  # Redis integration tests — exercises the Redis-backed NodeRegistry against a
  # real Redis 7 instance provided by the GitHub Actions service container.
  # ---------------------------------------------------------------------------
  redis:
    name: redis integration tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      MCS_TEST_REDIS_URL: "redis://localhost:6379"
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: redis

      - name: Run mcs-cluster Redis integration tests
        run: >
          cargo test -p mcs-cluster --features redis -- --ignored
          --test-threads=1

      - name: Run mcs-server cluster_redis integration test
        run: >
          cargo test -p mcs-server --test cluster_redis -- --ignored
          --test-threads=1

      - name: Run mcs-server multi-node failover integration test
        run: >
          cargo test -p mcs-server --test failover_redis -- --ignored
          --test-threads=1

  # ---------------------------------------------------------------------------
  # Postgres compile check — ensures the postgres feature compiles cleanly and
  # passes clippy. No tests are run; a live Postgres instance is not provisioned.
  # ---------------------------------------------------------------------------
  postgres-compile:
    name: postgres compile check
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: postgres

      - name: Clippy (postgres feature)
        run: >
          cargo clippy -p mcs-storage
          --no-default-features --features postgres
          --all-targets -- -D warnings

      - name: Build (postgres feature)
        run: >
          cargo build -p mcs-storage
          --no-default-features --features postgres

  # ---------------------------------------------------------------------------
  # Postgres integration tests — runs the same `mcs-storage` integration suite
  # that the default `ci` job runs on SQLite, but against a real Postgres 16
  # service container. Each test provisions a private, uniquely-named schema and
  # pins its pool's `search_path` to it (see `tests/harness.rs`), so the shared
  # database stays isolated test-to-test. This proves the portable DDL and the
  # runtime sqlx queries behave identically on both backends.
  # ---------------------------------------------------------------------------
  postgres-tests:
    name: postgres integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mcs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mcs_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      # The harness reads this to target Postgres; unset, the suite runs on
      # in-memory SQLite (as in the `ci` job).
      MCS_TEST_DATABASE_URL: "postgres://postgres:postgres@localhost:5432/mcs_test"
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: postgres-tests

      - name: Run mcs-storage integration suite (postgres)
        run: >
          cargo test -p mcs-storage
          --no-default-features --features postgres
          -- --test-threads=1

  # ---------------------------------------------------------------------------
  # MSRV check — builds the workspace with the minimum supported Rust version
  # declared in Cargo.toml (`rust-version = "1.82"`).
  # ---------------------------------------------------------------------------
  msrv:
    name: MSRV (1.82)
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.82 toolchain
        uses: dtolnay/rust-toolchain@1.82

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv

      - name: Build workspace (MSRV)
        run: cargo build --workspace --locked

  # ---------------------------------------------------------------------------
  # Dependency audit — checks for known security advisories, license compliance,
  # and duplicate crates using cargo-deny (deny.toml at workspace root).
  # ---------------------------------------------------------------------------
  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Run cargo-deny on the host toolchain rather than the action's musl
      # container, which fails to honour the repo's rust-toolchain.toml.
      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: cargo deny check
        run: cargo deny check
