# Sample MCS server configuration.
#
# Every key below is OPTIONAL: each one shown here is set to its built-in
# default, so deleting this file entirely yields an identical configuration.
# Copy it, adjust the values you care about, and place it next to the binary
# (or point `MCS_CONFIG` at it).
#
# Precedence, lowest to highest:
#   1. built-in defaults
#   2. this file (config.toml, or $MCS_CONFIG)
#   3. environment variables prefixed `MCS_` (nested keys use `__`,
#      e.g. `MCS_SIWE__DOMAIN=chess.example`)

# The address the HTTP server binds to.
bind = "127.0.0.1:8080"

# Storage connection string passed to SqlxStorage::connect.
#   sqlite://mcs.db?mode=rwc  -> single file in the working dir, created on first run (dev default)
#   sqlite::memory:           -> ephemeral, in-memory (tests only)
#   postgres://user:pass@host/db -> requires the `postgres` storage feature
database_url = "sqlite://mcs.db?mode=rwc"

[log]
# Output format: "pretty" (human-readable) or "json" (structured).
format = "pretty"
# Fallback tracing filter when RUST_LOG is unset. Accepts EnvFilter syntax,
# e.g. "info" or "info,mcs_api=debug".
level = "info"

[session]
# HMAC-SHA256 signing secret for session JWTs. REQUIRED in production: keep it
# secret and high-entropy (>= 32 bytes). If omitted, the server generates a
# random ephemeral secret at startup and logs a warning — every restart then
# invalidates all existing sessions. Uncomment and set a stable value:
# secret = "change-me-to-a-long-random-string"
# Token lifetime in seconds (default: 86400 = 24 hours).
ttl_secs = 86400
# The `iss` (issuer) claim written into and required on session tokens.
issuer = "mcs"

[siwe]
# Sign-In with Ethereum challenge parameters. `domain`/`uri` bind every issued
# challenge to this deployment's identity.
domain = "localhost:8080"
uri = "http://localhost:8080"
# EIP-155 chain ID the session is bound to (1 = Ethereum mainnet).
chain_id = 1
# Human-readable statement shown in the user's wallet (single line).
statement = "Sign in to MCS."
# How long a freshly issued nonce stays valid, in seconds (default: 600 = 10m).
nonce_ttl_secs = 600

[payments]
# x402 payment gating for game creation (POST /seeks). DISABLED by default: the
# server boots free and `POST /seeks` behaves exactly as before. This is the
# hook where, per the roadmap, RBC (and other) game creation would be charged.
#
# When `enabled = true`, the server advertises the terms below in a
# `402 Payment Required` response to any unpaid `POST /seeks`; a client that
# retries with a valid `X-PAYMENT` header (a settled x402 payment) is let
# through to create the seek/game. Only the creation route is gated — reads,
# seek cancellation, auth, and the WebSocket stay free.
enabled = false
# The x402 scheme. The canonical value is "exact" (transfer exactly the amount).
scheme = "exact"
# Target network, e.g. "base" or "base-sepolia".
network = "base-sepolia"
# Accepted payment-token contract address (default: USDC on Base Sepolia).
asset = "0x036CbD53842c5426634e7929541eC2318f3dCF7e"
# On-chain address that must RECEIVE the payment. The default is the zero
# address (an invalid recipient) on purpose: enabling payments without setting
# a real `pay_to` is almost certainly a mistake. Set this before going live.
pay_to = "0x0000000000000000000000000000000000000000"
# Maximum token amount accepted, in the asset's smallest unit
# (e.g. "10000" = 0.01 USDC at 6 decimals).
max_amount_required = "10000"
# Human-readable description shown to the payer before paying.
description = "Create an MCS game."
# Maximum seconds a signed authorization may stay pending before it expires.
max_timeout_seconds = 300
# Which verifier to build:
#   "mock"        -> DEV-ONLY MockVerifier. Performs no cryptographic or on-chain
#                    checks; NEVER use in production.
#   "facilitator" -> Production FacilitatorVerifier. Delegates /verify + /settle
#                    to the x402 facilitator at `facilitator_url` (required).
verifier = "mock"
# Base URL of the x402 facilitator. REQUIRED when `verifier = "facilitator"`;
# the server refuses to start without it. Point it at any standards-compliant
# facilitator that exposes POST /verify and POST /settle.
# facilitator_url = "https://facilitator.example.com"
# Optional bearer token sent to the facilitator as `Authorization: Bearer ...`.
# facilitator_api_key = "your-facilitator-api-key"

[http]
# HTTP hardening: request timeout, body-size limit, WebSocket message limit,
# and security headers. All values shown here are the built-in defaults.

# How long a handler may run (in seconds) before the server aborts it and
# returns a timeout error to the client. Protects against slow-loris style
# attacks and runaway handlers.
request_timeout_secs = 30

# Maximum accepted HTTP request body size, in bytes. Any body larger than
# this is rejected with 413 Payload Too Large before the handler is called.
# The default (65536 = 64 KiB) is generous for JSON API payloads and tight
# enough to protect against memory-exhaustion attacks.
max_body_bytes = 65536

# Maximum WebSocket message size, in bytes. A single frame or reassembled
# fragmented message that exceeds this limit causes the socket to be closed.
# The default (1048576 = 1 MiB) is ample for game-state JSON.
max_ws_message_bytes = 1048576

# Security headers are always applied:
#   X-Content-Type-Options: nosniff
#   X-Frame-Options: DENY
#   Content-Security-Policy: default-src 'none'; frame-ancestors 'none'
#   Referrer-Policy: no-referrer
#
# Strict-Transport-Security is DISABLED by default because it must only be
# sent over TLS. Enable it ONLY after placing a TLS terminator (nginx, Caddy,
# a cloud load balancer, etc.) in front of this server. Never enable it while
# the server itself handles plain HTTP — browsers will refuse to connect over
# plain HTTP for `hsts_max_age_secs` seconds, which is very hard to undo.
# hsts = false
# hsts_max_age_secs = 31536000  # 1 year (recommended production value)
