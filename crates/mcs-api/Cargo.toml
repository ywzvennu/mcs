[package]
name = "mcs-api"
description = "HTTP API layer for the MCS server: unified error type, RFC 9457 problem+json responses, and the ApiResult alias."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[lints]
workspace = true

[dependencies]
mcs-core.workspace = true
mcs-domain.workspace = true
# Backend-agnostic: only the repository traits/types are used in library code,
# so disable the default `sqlite` backend feature here. Otherwise it would leak
# (via Cargo feature unification) into the Postgres-only server build and
# silently select the SQLite backend. The integration tests below opt the
# concrete SQLite backend back in via the dev-dependency. A `path` dep is
# required because `default-features = false` is ignored under `workspace = true`.
mcs-storage = { path = "../mcs-storage", default-features = false }
mcs-auth.workspace = true
mcs-game.workspace = true
# The Glicko-2 rating engine, with the `domain` feature so we can convert
# to/from `mcs_domain::Rating` when applying a post-game update. Referenced by
# path (the workspace manifest carries no `mcs-rating` entry, and the common
# rule is that crate PRs do not edit the root manifest).
mcs-rating = { path = "../mcs-rating", features = ["domain"] }
# x402 payment middleware used to optionally gate game creation (`POST /seeks`).
# Referenced by path: `mcs-payments` is not in `[workspace.dependencies]`, and
# member path deps are allowed (only the root manifest is off-limits).
mcs-payments = { path = "../mcs-payments" }
# Clustering primitives for cluster-aware WebSocket routing (#68). Referenced by
# path with NO Redis feature: the API layer only ever holds an
# `Arc<dyn NodeRegistry>` and computes ownership via the pure HRW directory, so
# it links no backend. The Redis-backed registry is constructed solely by
# `mcs-server` when cluster mode is explicitly enabled.
mcs-cluster = { path = "../mcs-cluster" }
async-trait.workspace = true
axum.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tracing.workspace = true
tokio.workspace = true
# Drive the spectator event-bus subscription stream (#109): the WS spectator
# path consumes the boxed `Stream` of frames returned by `EventBus::subscribe`.
tokio-stream = { workspace = true }
time.workspace = true
hex = "0.4"
# Metrics facade (#88): handlers and middleware record through these macros into
# whatever recorder is installed by the composition root. Not in the workspace
# set, so pinned directly here (member path/version deps are allowed; only the
# root manifest is off-limits). A no-op recorder is used until `mcs-server`
# installs the Prometheus exporter, so the macros are always safe to call.
metrics = "0.24"

[dev-dependencies]
# Drive the router in-process without binding a socket.
tokio = { workspace = true }
tower = { workspace = true }
# The concrete SQLite-backed storage used as the integration-test backend.
mcs-storage = { workspace = true, features = ["sqlite"] }
# Local test signer: derive an address from a fixed private key and produce
# EIP-191 personal-sign signatures over the SIWE challenge, mirroring a wallet.
k256 = { version = "0.13", default-features = false, features = ["ecdsa", "std"] }
sha3 = "0.10"
# EIP-4361 message parser used in test helpers to compute the EIP-191 prehash
# for signing. Kept as a dev-only dep since the production code now goes through
# mcs-auth exclusively.
siwe = { version = "0.6.1", default-features = false }
# The standard-chess variant, used to spawn a real game session in WS tests.
mcs-variant-standard = { workspace = true }
# The RBC variant, used in the variants-endpoint integration tests.
mcs-variant-rbc = { path = "../mcs-variant-rbc" }
# A real WebSocket client to exercise the live-game socket end to end.
tokio-tungstenite = "0.24"
# `SinkExt`/`StreamExt` for driving the tungstenite client stream in tests.
futures = { workspace = true }
