# cargo-deny configuration for the MCS workspace.
#
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
# Warn on unmaintained crates but do not fail the build on them.
unmaintained = "warn"
# Fail on crates with known security vulnerabilities.
yanked = "warn"
# No advisories are ignored — the dependency tree is currently clean.

[licenses]
# Fail if an unlicensed crate is encountered.
unlicensed = "deny"
# Fail on copyleft licenses that would impose obligations on the binary.
copyleft = "deny"
# OSI-approved permissive licences in common use across the Rust ecosystem.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "OpenSSL",
  "Zlib",
  "CC0-1.0",
]

[[licenses.clarify]]
# `ring` ships its own OpenSSL-derived crypto code. Its LICENSE file is a
# combination of ISC (the bulk of ring), MIT, and OpenSSL-derived code.
# cargo-deny sees it as a non-standard expression; we clarify it here so the
# license check passes without having to mark the whole crate as allowed.
name = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
# Two versions of the same crate in the dependency tree are common during
# ecosystem transitions; treat them as warnings rather than hard errors so CI
# stays green while upstream crates converge on newer releases.
multiple-versions = "warn"
# Wildcard dependencies in published crates are sloppy; warn about them.
wildcards = "warn"
# Deny crates that are known to be problematic or have been replaced upstream.
deny = []

[sources]
# Allow crates from crates.io and from git sources (rbc-rs is a git dep).
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/ywzvennu/rbc-rs"]
