# cargo-deny configuration for the MCS workspace (schema for cargo-deny 0.18+).
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
# Check unmaintained advisories across the whole tree; warn on yanked crates.
# Security vulnerabilities fail the check by default.
unmaintained = "all"
yanked = "warn"
ignore = []

[licenses]
# Deny-by-default: every crate's license must be on this allow-list.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Zlib",
  "CC0-1.0",
  "MPL-2.0",
  "BSL-1.0",
  "OpenSSL",
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

# `shakmaty` (the chess move-generation library used by the standard and other
# variants) is licensed GPL-3.0-or-later. MCS's own crates are MIT OR Apache-2.0,
# but linking shakmaty means the *distributed server binary* is subject to
# GPL-3.0 copyleft. This exception scopes the GPL allowance to shakmaty alone, so
# any other GPL-licensed dependency would still fail the check. See the
# project's licensing notes; revisit if a permissively-licensed engine replaces
# shakmaty.
[[licenses.exceptions]]
crate = "shakmaty"
allow = ["GPL-3.0-or-later"]

[bans]
# The lock file carries some duplicate versions during ecosystem transitions;
# surface them as warnings rather than hard failures.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# The RBC variant depends on the project's own public git crate.
allow-git = ["https://github.com/ywzvennu/rbc-rs"]
